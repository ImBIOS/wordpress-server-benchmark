version: '3.8'

services:
  db:
    image: mariadb:10.11
    container_name: wp_db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: wp_default
      MYSQL_USER: wp_user
      MYSQL_PASSWORD: wp_password
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # OpenLiteSpeed
  ols:
    image: litespeedtech/openlitespeed:1.8.1-lsphp83
    container_name: wp_ols
    environment:
      WP_DB: wp_ols
    volumes:
      - ./wordpress_ols:/var/www/vhosts/localhost/html
    ports:
      - "8081:80"
      - "9441:443"
    depends_on:
      - db
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # PHP-FPM for Nginx
  php-fpm-nginx:
    build:
      context: ./php-fpm
    container_name: wp_php_nginx
    environment:
      WP_DB: wp_nginx
    volumes:
      - ./wordpress_nginx:/var/www/html
      - ./wordpress_ols:/wordpress_ols
      - ./wordpress_apache:/wordpress_apache
      - ./wordpress_caddy:/wordpress_caddy
    depends_on:
      - db
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # Nginx
  nginx:
    image: nginx:alpine
    container_name: wp_nginx
    volumes:
      - ./wordpress_nginx:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/nginx/ssl
    ports:
      - "8082:80"
      - "9442:443"
    depends_on:
      - php-fpm-nginx
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # Apache (runs both Apache and PHP)
  apache:
    build:
      context: ./apache
    container_name: wp_apache
    environment:
      WP_DB: wp_apache
    volumes:
      - ./wordpress_apache:/var/www/html
      - ./apache/apache.conf:/etc/apache2/conf-enabled/custom.conf
      - ./ssl:/etc/apache2/ssl
    ports:
      - "8083:80"
      - "9443:443"
    depends_on:
      - db
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # PHP-FPM for Caddy
  php-fpm-caddy:
    build:
      context: ./php-fpm
    container_name: wp_php_caddy
    environment:
      WP_DB: wp_caddy
    volumes:
      - ./wordpress_caddy:/var/www/html
    depends_on:
      - db
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # Caddy
  caddy:
    image: caddy:alpine
    container_name: wp_caddy
    volumes:
      - ./wordpress_caddy:/var/www/html
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
    ports:
      - "8084:80"
      - "9444:443"
    depends_on:
      - php-fpm-caddy
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # Benchmarker
  benchmarker:
    build:
      context: ./benchmark
    container_name: wp_benchmarker
    depends_on:
      - ols
      - nginx
      - apache
      - caddy
    volumes:
      - ./benchmark/results:/results
    # Run in the same network as other containers
    restart: "no"

volumes:
  db_data:
